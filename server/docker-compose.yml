version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    container_name: elementary-dices-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5433:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
